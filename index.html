<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Sequence</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    img {
      display: block;
      width: 300px; /* 훨씬 작게 */
      max-width: 40vw; /* 화면 대응 */
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <img src="qr_sequence_fast.gif" alt="QR sequence animation" />
</body>
</html>
